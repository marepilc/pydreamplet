<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="300px" height="300px">
  <circle cx="300" cy="300" r="250" fill="none" stroke="#92a1c2" stroke-width="2" opacity=".35"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="#e2cbc5" stroke-width="2" opacity=".6"/>
  <circle cx="300" cy="300" r="250" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="20,15" stroke-dashoffset="20">
    <animate dur="2s" attributeType="XML" attributeName="stroke-dashoffset" repeatCount="indefinite" values="0;100"/>
    <animate dur="2s" attributeType="XML" attributeName="r" repeatCount="indefinite" values="250;200;250"/>
  </circle>
  <circle cx="300" cy="300" r="5" fill="#f83898"/>
  <text x="300" y="586" text-anchor="middle" font-size="20" fill="currentColor">r: 250 -> 200 -> 250</text>
</svg>
