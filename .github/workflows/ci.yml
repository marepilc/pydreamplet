name: ci
on:
  push:
    branches:
      - "**" # Trigger on pushes to all branches
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --group dev --group docs

      - name: Run tests
        run: uv run pytest

      - name: Run basedpyright
        run: uv run basedpyright pydreamplet

      - name: Run mypy
        run: uv run mypy pydreamplet tests

      - name: Run Ruff
        run: uv run ruff check pydreamplet tests

      - name: Build documentation
        run: uv run mkdocs build

      - name: Build package
        run: uv build

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/pydreamplet-wheel
          /tmp/pydreamplet-wheel/bin/python -m pip install --upgrade pip
          /tmp/pydreamplet-wheel/bin/python -m pip install dist/*.whl
          /tmp/pydreamplet-wheel/bin/python -c "import pydreamplet as dp; assert dp.SVG(10, 10).w == 10"

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache MkDocs Material dependencies
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install documentation dependencies
        run: uv sync --group docs

      - name: Deploy MkDocs site
        run: uv run mkdocs gh-deploy --force
