name: ci
on:
  push:
    branches:
      - "**" # Trigger on pushes to all branches
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Run basedpyright
        run: uv run basedpyright

      - name: Run mypy
        run: uv run mypy pydreamplet tests

      - name: Run Ruff
        run: uv run ruff check pydreamplet tests

      - name: Install documentation dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Build package
        run: uv build

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/pydreamplet-wheel
          /tmp/pydreamplet-wheel/bin/python -m pip install --upgrade pip
          /tmp/pydreamplet-wheel/bin/python -m pip install dist/*.whl
          /tmp/pydreamplet-wheel/bin/python -c "import pydreamplet as dp; assert dp.SVG(10, 10).w == 10"
